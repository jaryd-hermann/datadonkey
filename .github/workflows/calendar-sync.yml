name: Calendar sync (every 5 min)

on:
  schedule:
    # Hobby Vercel doesn't allow sub-daily crons, so we run the calendar
    # poll from GitHub Actions and hit the Vercel endpoint by HTTP.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit calendar-sync
        run: |
          curl -sS -m 60 "${APP_URL}/api/cron/calendar-sync" -o /tmp/out
          echo "---"
          cat /tmp/out
        env:
          APP_URL: ${{ secrets.APP_URL }}
